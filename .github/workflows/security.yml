name: Security

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - '**/package.json'
      - '**/package-lock.json'
      - '.github/workflows/security.yml'
      - '.github/security/**'
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  npm-audit:
    name: NPM Audit (${{ matrix.project }})
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        project: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - name: Install Dependencies
        run: npm ci
        working-directory: ./${{ matrix.project }}
      - name: Generate Audit Report (JSON)
        run: npm audit --json > audit.json || true
        working-directory: ./${{ matrix.project }}
      - name: Enforce Baseline (High/Critical)
        env:
          PROJECT: ${{ matrix.project }}
          # Scheduled and manual runs also block on any critical vulnerability.
          STRICT_CRITICAL: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: node ../.github/security/check-audit-baseline.js
        working-directory: ./${{ matrix.project }}
